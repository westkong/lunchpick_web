<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1932px;
      height: 828px;
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #FF6A00 0%, #FF9A3C 60%, #FFB366 100%);
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 배경 원형 장식 */
    .circle1 {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: -200px; right: 300px;
    }
    .circle2 {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      bottom: -150px; right: 600px;
    }
    .circle3 {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: 50px; right: 200px;
    }

    /* 왼쪽 텍스트 영역 */
    .left {
      flex: 1;
      padding: 0 120px;
      z-index: 1;
    }
    .tag {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 28px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 100px;
      margin-bottom: 36px;
      letter-spacing: 1px;
    }
    .title {
      font-size: 120px;
      font-weight: 900;
      color: white;
      line-height: 1;
      letter-spacing: -4px;
      text-shadow: 0 8px 32px rgba(0,0,0,0.15);
      margin-bottom: 28px;
    }
    .subtitle {
      font-size: 42px;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
      letter-spacing: -1px;
    }

    /* 오른쪽 이미지 영역 */
    .right {
      width: 680px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      padding-right: 80px;
    }
    .phone-mock {
      width: 320px;
      height: 620px;
      background: white;
      border-radius: 48px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .phone-header {
      height: 64px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: #111;
    }
    .phone-body {
      flex: 1;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      background: #fafafa;
    }
    .phone-logo {
      font-size: 56px;
      margin-bottom: 4px;
    }
    .phone-name {
      font-size: 28px;
      font-weight: 900;
      color: #111;
      letter-spacing: -1px;
    }
    .phone-tagline {
      font-size: 14px;
      color: #888;
      margin-top: -12px;
    }
    .phone-btn {
      width: 100%;
      padding: 18px;
      background: #FF6A00;
      color: white;
      border-radius: 16px;
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      margin-top: 12px;
      box-shadow: 0 8px 24px rgba(255,106,0,0.35);
    }
    .phone-btn2 {
      width: 100%;
      padding: 16px;
      background: white;
      color: #FF6A00;
      border: 2px solid #FF6A00;
      border-radius: 16px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="circle3"></div>

  <div class="left">
    <div class="tag">🍱 음식 추천 미니앱</div>
    <div class="title">먹픽</div>
    <div class="subtitle">점심 고민 1분 컷.</div>
  </div>

  <div class="right">
    <div class="phone-mock">
      <div class="phone-header">먹픽</div>
      <div class="phone-body">
        <div class="phone-logo">🍱</div>
        <div class="phone-name">먹픽</div>
        <div class="phone-tagline">점심 고민 1분 컷.</div>
        <div class="phone-btn">▶ 추천 시작</div>
        <div class="phone-btn2">🎰 룰렛 돌리기</div>
      </div>
    </div>
  </div>
</body>
</html>
