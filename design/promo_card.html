<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(160deg, #FF6A00 0%, #FF9A3C 100%);
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      overflow: hidden;
      position: relative;
    }
    .capsules {
      display: flex;
      gap: 28px;
    }
    .capsule {
      position: relative;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .capsule .bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 50%; }
    .capsule .top {
      position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(160deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.4) 100%);
    }
    .capsule .seam { position: absolute; top: calc(50% - 5px); left: 0; right: 0; height: 10px; background: rgba(0,0,0,0.15); }
    .capsule .emoji {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px;
    }
    .c1 .bottom { background: #4A90E2; }
    .c2 .bottom { background: linear-gradient(150deg, #FFE259, #FFA751); }
    .c3 .bottom { background: #21C17A; }
    .c2 { box-shadow: 0 10px 40px rgba(255,226,89,0.7); transform: scale(1.15); }
    .headline {
      font-size: 110px;
      font-weight: 900;
      color: white;
      letter-spacing: -4px;
      text-shadow: 0 6px 24px rgba(0,0,0,0.2);
      text-align: center;
      line-height: 1.2;
    }
    .sub {
      font-size: 44px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      text-align: center;
      line-height: 1.5;
    }
    .badge {
      margin-top: 16px;
      background: white;
      color: #FF6A00;
      font-size: 40px;
      font-weight: 900;
      padding: 26px 60px;
      border-radius: 100px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .free {
      position: absolute;
      top: 60px;
      right: 60px;
      background: rgba(255,255,255,0.25);
      border: 3px solid white;
      color: white;
      font-size: 32px;
      font-weight: 800;
      padding: 16px 32px;
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <div class="free">설치 없음 · 무료</div>
  <div class="capsules">
    <div class="capsule c1"><div class="bottom"></div><div class="top"></div><div class="seam"></div><div class="emoji">🍜</div></div>
    <div class="capsule c2"><div class="bottom"></div><div class="top"></div><div class="seam"></div><div class="emoji">🍱</div></div>
    <div class="capsule c3"><div class="bottom"></div><div class="top"></div><div class="seam"></div><div class="emoji">🍕</div></div>
  </div>
  <div class="headline">점심 뭐 먹지?<br>뽑아서 정해</div>
  <div class="sub">인형뽑기로 메뉴 뽑고, 캡슐 도감 모으고,<br>커피 누가 살지 내기까지 ☕</div>
  <div class="badge">토스 검색창에 "먹픽" 🔍</div>
</body>
</html>
