<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 600px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #FF6A00, #FF9A3C);
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    .logo-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .emoji {
      font-size: 160px;
      line-height: 1;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.2));
    }
    .name {
      font-size: 88px;
      font-weight: 900;
      color: white;
      letter-spacing: -2px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="logo-box">
    <div class="emoji">🍱</div>
    <div class="name">먹픽</div>
  </div>
</body>
</html>
