<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #FF5500 0%, #FF8C00 100%);
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .icon-wrap {
      width: 220px; height: 220px;
      background: rgba(255,255,255,0.18);
      border-radius: 56px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .name {
      font-size: 100px;
      font-weight: 900;
      color: white;
      letter-spacing: -4px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.18);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon-wrap">
      <!-- 커스텀 SVG 아이콘: 포크+주사위 조합 -->
      <svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 접시 -->
        <ellipse cx="65" cy="82" rx="46" ry="12" fill="rgba(255,255,255,0.15)"/>
        <ellipse cx="65" cy="78" rx="46" ry="30" fill="rgba(255,255,255,0.9)"/>
        <ellipse cx="65" cy="74" rx="40" ry="26" fill="white"/>
        <!-- 음식 (밥그릇 모양) -->
        <ellipse cx="65" cy="68" rx="30" ry="18" fill="#FFE0B2"/>
        <ellipse cx="65" cy="62" rx="26" ry="14" fill="#FFF3E0"/>
        <!-- 젓가락 -->
        <rect x="88" y="20" width="5" height="52" rx="2.5" fill="white" transform="rotate(15 88 20)"/>
        <rect x="96" y="20" width="5" height="52" rx="2.5" fill="rgba(255,255,255,0.7)" transform="rotate(15 96 20)"/>
        <!-- 숟가락 -->
        <ellipse cx="34" cy="30" rx="8" ry="10" fill="white"/>
        <rect x="31" y="38" width="6" height="32" rx="3" fill="white"/>
        <!-- 반짝임 -->
        <circle cx="92" cy="38" r="3" fill="rgba(255,255,255,0.6)"/>
        <circle cx="38" cy="22" r="2" fill="rgba(255,255,255,0.5)"/>
      </svg>
    </div>
    <div class="name">먹픽</div>
  </div>
</body>
</html>
