<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #111;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(125deg, #1a1a1a 0%, #2d1200 40%, #FF5500 100%);
    }
    .glow1 {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,100,0,0.4) 0%, transparent 70%);
      right: -100px; top: -100px;
    }
    .glow2 {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,150,0,0.2) 0%, transparent 70%);
      left: 200px; bottom: -100px;
    }
    .layout {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 100px;
      gap: 80px;
    }
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-size: 22px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 100px;
      width: fit-content;
    }
    .main-title {
      font-size: 110px;
      font-weight: 900;
      color: white;
      line-height: 1;
      letter-spacing: -5px;
    }
    .main-title span { color: #FF8C00; }
    .sub-title {
      font-size: 36px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
      letter-spacing: -1px;
    }
    .features {
      display: flex;
      gap: 14px;
      margin-top: 8px;
    }
    .feat {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 18px 22px;
      flex: 1;
    }
    .feat-icon { font-size: 28px; margin-bottom: 8px; }
    .feat-text { font-size: 18px; color: rgba(255,255,255,0.8); font-weight: 500; line-height: 1.4; }
    .right { width: 320px; flex-shrink: 0; }
    .phone {
      width: 300px;
      background: white;
      border-radius: 44px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }
    .phone-nav {
      height: 56px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: #111;
    }
    .phone-body {
      background: #fafafa;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .phone-logo {
      width: 64px; height: 64px;
      background: linear-gradient(145deg, #FF5500, #FF8C00);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      box-shadow: 0 8px 24px rgba(255,85,0,0.35);
      margin-bottom: 4px;
    }
    .phone-name { font-size: 26px; font-weight: 900; color: #111; }
    .phone-tag { font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .p-btn1 {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #FF5500, #FF8C00);
      color: white;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 8px 20px rgba(255,85,0,0.4);
    }
    .p-btn2 {
      width: 100%;
      padding: 14px;
      background: white;
      color: #FF5500;
      border: 2px solid #FF5500;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }
    .p-hist {
      width: 100%;
      background: white;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 4px;
      border: 1px solid #eee;
    }
    .p-hist-title { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .p-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .p-chip {
      padding: 5px 12px;
      background: #f5f5f5;
      border-radius: 100px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="layout">
    <div class="left">
      <div class="badge">🍱 토스 미니앱</div>
      <div class="main-title">먹<span>픽</span></div>
      <div class="sub-title">점심 고민, 이제 1분 컷.</div>
      <div class="features">
        <div class="feat">
          <div class="feat-icon">🎯</div>
          <div class="feat-text">조건별<br>메뉴 추천</div>
        </div>
        <div class="feat">
          <div class="feat-icon">🎰</div>
          <div class="feat-text">랜덤<br>룰렛</div>
        </div>
        <div class="feat">
          <div class="feat-icon">📍</div>
          <div class="feat-text">근처<br>음식점</div>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="phone">
        <div class="phone-nav">먹픽</div>
        <div class="phone-body">
          <div class="phone-logo">🍱</div>
          <div class="phone-name">먹픽</div>
          <div class="phone-tag">점심 고민 1분 컷.</div>
          <div class="p-btn1">▶ 추천 시작</div>
          <div class="p-btn2">🎰 룰렛 돌리기</div>
          <div class="p-hist">
            <div class="p-hist-title">최근 먹은 메뉴</div>
            <div class="p-chips">
              <span class="p-chip">김치찌개</span>
              <span class="p-chip">라멘</span>
              <span class="p-chip">비빔밥</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
